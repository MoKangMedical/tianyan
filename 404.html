<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · 天眼 Tianyan</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/github-pages.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-3), var(--accent-2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }
        .error-desc {
            color: var(--muted);
            margin-bottom: 32px;
            max-width: 400px;
        }
        .error-links {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">页面未找到</h1>
        <p class="error-desc">你访问的页面不存在或已被移动。请检查URL是否正确，或返回首页。</p>
        <div class="error-links">
            <a class="button button-primary" href="index.html">返回首页</a>
            <a class="button button-secondary" href="docs/api.html">API文档</a>
            <a class="button button-secondary" href="https://github.com/MoKangMedical/tianyan">GitHub</a>
        </div>
    </div>
</body>
</html>
