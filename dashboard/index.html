<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天眼 Tianyan v2.0 — 交互式仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0c0c1d;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text: #e0e0e0;
    --dim: #94a3b8;
    --accent: #818cf8;
    --accent2: #c084fc;
    --green: #4ade80;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #2d1b69 100%);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: rgba(12,12,29,0.95);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 {
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  header .nav { display: flex; gap: 16px; }
  header .nav a { color: var(--dim); text-decoration: none; font-size: 0.9rem; }
  header .nav a.active { color: var(--accent); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.offline { background: var(--red); }

  .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
  .grid-3 { display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px; margin-top: 16px; }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .panel h2 { font-size: 1rem; color: var(--accent2); margin-bottom: 16px; }
  .full-width { grid-column: 1 / -1; }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--dim); margin-bottom: 4px; }
  .form-group input, .form-group select {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: rgba(255,255,255,0.06);
    color: var(--text); font-size: 0.9rem;
  }
  .form-group input:focus, .form-group select:focus {
    outline: none; border-color: var(--accent);
  }
  .channels-check { display: flex; flex-wrap: wrap; gap: 6px; }
  .channels-check label { font-size: 0.8rem; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .btn {
    width: 100%; padding: 10px; border: none; border-radius: 8px;
    font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary {
    background: var(--surface); color: var(--text); border: 1px solid var(--border);
  }

  /* Metrics */
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .metric-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; text-align: center;
  }
  .metric-card .value { font-size: 1.8rem; font-weight: 800; }
  .metric-card .label { font-size: 0.75rem; color: var(--dim); margin-top: 2px; }
  .text-green { color: var(--green); }
  .text-accent { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* Chart */
  .chart-wrap { position: relative; height: 280px; margin: 16px 0; }
  canvas { width: 100% !important; }

  /* Recommendations */
  .rec-item {
    padding: 10px 14px; border-left: 3px solid var(--accent);
    background: rgba(129,140,248,0.06); border-radius: 6px;
    margin-bottom: 8px; font-size: 0.85rem; color: var(--dim);
  }
  .rec-item strong { color: var(--text); }

  /* Loading */
  .spinner {
    display: inline-block; width: 20px; height: 20px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toast {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    padding: 12px 20px; border-radius: 8px; font-size: 0.85rem;
    animation: slideIn 0.3s;
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast-error { background: rgba(248,113,113,0.2); border: 1px solid var(--red); color: var(--red); }
  .toast-success { background: rgba(74,222,128,0.2); border: 1px solid var(--green); color: var(--green); }

  /* History table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { color: var(--dim); font-weight: 500; }
  tr:hover { background: rgba(255,255,255,0.03); }

  @media (max-width: 1024px) {
    .grid-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>👁️ 天眼 Tianyan v2.0</h1>
  <div class="nav">
    <span><span class="status-dot online" id="status-dot"></span><span id="status-text">检测中...</span></span>
    <a href="/dashboard" class="active">仪表盘</a>
    <a href="/dashboard/history">历史记录</a>
    <a href="/docs" target="_blank">API文档</a>
  </div>
</header>

<div class="container">
  <!-- Top Metrics Row -->
  <div class="metric-grid" id="quick-stats"></div>

  <!-- Main Grid -->
  <div class="grid-3">
    <!-- LEFT: Controls -->
    <div class="panel">
      <h2>🎯 预测参数</h2>
      <div class="form-group">
        <label>产品名称</label>
        <input type="text" id="product-name" value="司美格鲁肽减重版" placeholder="输入产品名称">
      </div>
      <div class="form-group">
        <label>产品价格 (¥)</label>
        <input type="number" id="product-price" value="399" min="0" step="1">
      </div>
      <div class="form-group">
        <label>产品品类</label>
        <select id="product-category">
          <option value="消费医疗">消费医疗</option>
          <option value="美妆护肤">美妆护肤</option>
          <option value="健康食品">健康食品</option>
          <option value="数码产品">数码产品</option>
          <option value="母婴用品">母婴用品</option>
        </select>
      </div>
      <div class="form-group">
        <label>人群规模</label>
        <input type="number" id="pop-size" value="200" min="10" max="5000">
      </div>
      <div class="form-group">
        <label>目标地区</label>
        <select id="region">
          <option value="全国">全国</option>
          <option value="一线城市">一线城市</option>
          <option value="新一线城市">新一线城市</option>
          <option value="二线城市">二线城市</option>
        </select>
      </div>
      <div class="form-group">
        <label>营销渠道</label>
        <div class="channels-check">
          <label><input type="checkbox" value="抖音" checked> 抖音</label>
          <label><input type="checkbox" value="小红书" checked> 小红书</label>
          <label><input type="checkbox" value="微信"> 微信</label>
          <label><input type="checkbox" value="淘宝"> 淘宝</label>
          <label><input type="checkbox" value="京东"> 京东</label>
        </div>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="use-llm" checked> 启用 DeepSeek LLM 增强推理</label>
      </div>
      <button class="btn btn-primary" id="run-btn" onclick="runPrediction()">
        🔮 运行预测
      </button>
      <button class="btn btn-secondary" style="margin-top:8px" onclick="runQuickSim()">
        ⚡ 快速仿真（规则引擎）
      </button>
    </div>

    <!-- MIDDLE: Results -->
    <div class="panel">
      <h2 id="result-title">📊 预测结果</h2>
      <div id="result-placeholder" style="color:var(--dim);text-align:center;padding:60px 20px">
        <div style="font-size:3rem;margin-bottom:12px">👁️</div>
        输入产品信息，点击运行预测<br>天眼将模拟虚拟消费者的市场反应
      </div>
      <div id="result-content" style="display:none">
        <div class="metric-grid">
          <div class="metric-card"><div class="value text-accent" id="m-purchase">--</div><div class="label">购买意愿</div></div>
          <div class="metric-card"><div class="value text-green" id="m-confidence">--</div><div class="label">平均置信度</div></div>
          <div class="metric-card"><div class="value" id="m-social" style="color:#fbbf24">--</div><div class="label">社交传播率</div></div>
          <div class="metric-card"><div class="value text-accent" id="m-time">--</div><div class="label">执行时间(ms)</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-decision"></canvas></div>
        <div class="chart-wrap"><canvas id="chart-segments"></canvas></div>
      </div>
    </div>

    <!-- RIGHT: Insights -->
    <div class="panel">
      <h2>💡 策略建议</h2>
      <div id="recs-placeholder" style="color:var(--dim);text-align:center;padding:40px 20px">
        运行预测后<br>自动生成策略建议
      </div>
      <div id="recs-content" style="display:none">
        <div id="recs-list"></div>
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <h3 style="font-size:0.85rem;color:var(--accent2);margin-bottom:8px">🔥 KOL推荐</h3>
          <div id="kol-info"></div>
        </div>
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <h3 style="font-size:0.85rem;color:var(--accent2);margin-bottom:8px">📺 直播预测</h3>
          <div id="live-info"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const API = '/api/v2/simulate/llm';
let decisionChart = null, segmentChart = null;

async function checkStatus() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    document.getElementById('status-dot').className = 'status-dot online';
    document.getElementById('status-text').textContent = `⚡ ${d.llm.mode} | v${d.version}`;
    // Quick stats
    document.getElementById('quick-stats').innerHTML = `
      <div class="metric-card"><div class="value text-accent">${d.templates || 5}</div><div class="label">行业模板</div></div>
      <div class="metric-card"><div class="value text-green">${d.llm.available ? '在线' : '降级'}</div><div class="label">AI引擎</div></div>
      <div class="metric-card"><div class="value text-accent">${d.llm.model || 'mock'}</div><div class="label">模型</div></div>
      <div class="metric-card"><div class="value text-green">${(d.persistence.total_simulations || 0)}</div><div class="label">历史仿真</div></div>
    `;
  } catch(e) {
    document.getElementById('status-dot').className = 'status-dot offline';
    document.getElementById('status-text').textContent = '离线';
  }
}

function toast(msg, type='error') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function getChannels() {
  return [...document.querySelectorAll('.channels-check input:checked')].map(c => c.value);
}

async function runPrediction() {
  const btn = document.getElementById('run-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 运行中...';

  const payload = {
    product_name: document.getElementById('product-name').value,
    price: parseFloat(document.getElementById('product-price').value),
    category: document.getElementById('product-category').value,
    channels: getChannels(),
    population_size: parseInt(document.getElementById('pop-size').value),
    use_llm: document.getElementById('use-llm').checked,
  };

  try {
    const r = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.detail || '预测失败');
    renderResults(d);
    toast('预测完成！', 'success');
  } catch(e) {
    toast(e.message, 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '🔮 运行预测';
  }
}

async function runQuickSim() {
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '⏳...';
  try {
    const r = await fetch('/api/simulate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        scenario_description: `${document.getElementById('product-name').value} ¥${document.getElementById('product-price').value} 上市`,
        population_size: parseInt(document.getElementById('pop-size').value),
      }),
    });
    const d = await r.json();
    if (!d.success) throw new Error(d.detail);
    renderQuickResults(d);
    toast('快速仿真完成！', 'success');
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '⚡ 快速仿真（规则引擎）';
  }
}

function renderResults(d) {
  document.getElementById('result-placeholder').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';
  document.getElementById('recs-placeholder').style.display = 'none';
  document.getElementById('recs-content').style.display = 'block';

  document.getElementById('result-title').textContent = `📊 ${d.product} ¥${d.price}`;
  document.getElementById('m-purchase').textContent = (d.key_metrics.purchase_intent * 100).toFixed(1) + '%';
  document.getElementById('m-confidence').textContent = (d.key_metrics.avg_confidence * 100).toFixed(1) + '%';
  document.getElementById('m-social').textContent = (d.key_metrics.social_influence_rate * 100).toFixed(1) + '%';
  document.getElementById('m-time').textContent = d.execution_time_ms.toFixed(0);

  // Decision distribution pie chart
  const dist = d.decision_distribution;
  const labels = Object.keys(dist);
  const values = Object.values(dist);
  if (decisionChart) decisionChart.destroy();
  decisionChart = new Chart(document.getElementById('chart-decision'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: ['#818cf8','#c084fc','#fbbf24','#4ade80','#f87171','#60a5fa','#94a3b8'],
        borderColor: 'rgba(12,12,29,0.8)',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12, font: { size: 11 } } },
        title: { display: true, text: '决策分布', color: '#c4b5fd', font: { size: 14 } }
      }
    }
  });

  // Segment bar chart
  const segs = d.segments || {};
  const segLabels = Object.keys(segs);
  const segValues = segLabels.map(k => segs[k].purchase_intent * 100);
  if (segmentChart) segmentChart.destroy();
  segmentChart = new Chart(document.getElementById('chart-segments'), {
    type: 'bar',
    data: {
      labels: segLabels.map(l => l.replace('城市_','').replace('年龄_','')),
      datasets: [{
        label: '购买意愿 (%)',
        data: segValues,
        backgroundColor: '#818cf8',
        borderRadius: 6,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } },
        x: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { display: false } }
      },
      plugins: {
        legend: { display: false },
        title: { display: true, text: '分群购买意愿', color: '#c4b5fd', font: { size: 14 } }
      }
    }
  });

  // Recommendations
  const recs = d.recommendations || [];
  document.getElementById('recs-list').innerHTML = recs.map(r => `<div class="rec-item">${r}</div>`).join('') || '<div class="rec-item">暂无建议</div>';

  // KOL
  const kol = d.kol_prediction || {};
  document.getElementById('kol-info').innerHTML = `
    <div style="font-size:0.8rem;color:var(--dim);line-height:1.8">
      📈 预估触达: ${(kol.predicted_reach||0).toLocaleString()}人<br>
      🔄 预估转化率: ${((kol.predicted_conversion||0)*100).toFixed(1)}%<br>
      🏆 最佳平台: ${kol.best_platform||'--'}<br>
      💰 ROI估算: ¥${(kol.roi_estimate||0).toLocaleString()}
    </div>`;

  // Livestream
  const live = d.livestream_prediction || {};
  document.getElementById('live-info').innerHTML = `
    <div style="font-size:0.8rem;color:var(--dim);line-height:1.8">
      👥 预估观众: ${(live.predicted_viewers||0).toLocaleString()}<br>
      💰 预估GMV: ¥${(live.predicted_gmv||0).toLocaleString()}
    </div>`;
}

function renderQuickResults(d) {
  document.getElementById('result-placeholder').style.display = 'none';
  document.getElementById('result-content').style.display = 'block';
  document.getElementById('result-title').textContent = '📊 快速仿真结果';
  document.getElementById('m-purchase').textContent = (d.purchase_intent * 100).toFixed(1) + '%';
  document.getElementById('m-confidence').textContent = '--';
  document.getElementById('m-social').textContent = '--';
  document.getElementById('m-time').textContent = d.execution_time_ms.toFixed(0);

  const dist = d.decision_distribution || {};
  const labels = Object.keys(dist);
  const values = Object.values(dist);
  if (decisionChart) decisionChart.destroy();
  decisionChart = new Chart(document.getElementById('chart-decision'), {
    type: 'doughnut',
    data: {
      labels: labels,
      datasets: [{
        data: values,
        backgroundColor: ['#818cf8','#c084fc','#fbbf24','#4ade80','#f87171','#60a5fa','#94a3b8'],
        borderColor: 'rgba(12,12,29,0.8)',
        borderWidth: 2,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { position: 'bottom', labels: { color: '#94a3b8' } },
        title: { display: true, text: '决策分布', color: '#c4b5fd' }
      }
    }
  });
}

checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
